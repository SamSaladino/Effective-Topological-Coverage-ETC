name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:
  test:
    name: Python 3.12 tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      MPLBACKEND: Agg

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Upgrade packaging tools
        run: |
          python -m pip install --upgrade pip setuptools wheel

      - name: Install ETC and test dependencies
        run: |
          python -m pip install -e ".[test]"

      - name: Verify package import
        run: |
          python -c "import etc; print(etc.__file__)"

      - name: Run tests
        run: |
          python -m pytest